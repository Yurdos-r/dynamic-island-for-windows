<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: http: https:; connect-src 'self' http://127.0.0.1:5173 ws://127.0.0.1:5173; object-src 'none'; base-uri 'self'; frame-ancestors 'none'"
    />
    <title>Dynamic Island for Windows</title>
  </head>
  <body>
    <div id="app"></div>
    <!-- 液态玻璃折射滤镜（方案 C）。供 styles.css 中 [data-glass="liquid-svg"] 通过
         backdrop-filter: url(#liquid-glass-displace) 引用，模拟真实玻璃的边缘折射。
         默认不被引用，仅当用户在设置卡片选择"液态折射"风格时生效。 -->
    <svg width="0" height="0" aria-hidden="true" style="position: absolute; pointer-events: none">
      <defs>
        <filter id="liquid-glass-displace" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
          <feTurbulence type="fractalNoise" baseFrequency="0.012 0.016" numOctaves="2" seed="7" result="noise" />
          <feGaussianBlur in="noise" stdDeviation="2" result="softNoise" />
          <feDisplacementMap
            id="liquid-glass-displace-node"
            in="SourceGraphic"
            in2="softNoise"
            scale="62"
            xChannelSelector="R"
            yChannelSelector="G"
          />
        </filter>
      </defs>
    </svg>
    <script type="module" src="/src/renderer/main.ts"></script>
  </body>
</html>
